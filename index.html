<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker OS</title>
    <style>
        :root { --bg-main: #0b0f19; --bg-card: #161b26; --text-main: #ffffff; --text-muted: #94a3b8; --accent: #4f46e5; --success: #10b981; }
        body { font-family: system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); max-width: 500px; margin: 0 auto; padding: 20px; }
        .screen { display: none; } .screen.active { display: block; }
        .nav-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #334155; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 16px; margin-top: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <span onclick="switchScreen('home')">🏠</span>
    <span onclick="switchScreen('track')">⏱️</span>
    <span onclick="switchScreen('goals')">🎯</span>
    <span onclick="switchScreen('trophies')">🏆</span>
</nav>

<!-- Home: Streak & Graph -->
<div id="screen-home" class="screen active">
    <div class="card">
        <h3>🔥 <span id="streak-count">0</span> Day Streak</h3>
        <select onchange="updateGraphView(this.value)">
            <option value="day">Daily View</option>
            <option value="week">Weekly View</option>
        </select>
        <div id="graph-display" style="height: 100px; background: #1e293b; margin-top: 10px;"></div>
    </div>
</div>

<!-- Track: Logging -->
<div id="screen-track" class="screen">
    <div class="card">
        <select id="sport-select"></select>
        <div id="activity-chips" class="stat-grid"></div>
        <input type="number" id="dur-input" placeholder="Minutes" style="width:100%; margin:10px 0;">
        <button class="btn" onclick="saveLog()">Record Session</button>
        <div id="history-log" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Goals: Adjustable -->
<div id="screen-goals" class="screen">
    <div class="card">
        <h3>Weekly Goal</h3>
        <input type="number" id="goal-input" value="300" onchange="updateGoal(this.value)">
        <div id="progress-ring"></div>
    </div>
</div>

<!-- Trophies: Milestones -->
<div id="screen-trophies" class="screen">
    <div class="card" id="trophy-list"></div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('apex_data')) || {
        streak: 0,
        weeklyGoal: 300,
        logs: [],
        totalMin: 0
    };

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        renderTrophies();
    }

    function updateGoal(val) {
        state.weeklyGoal = val;
        localStorage.setItem('apex_data', JSON.stringify(state));
    }

    function renderTrophies() {
        const list = document.getElementById('trophy-list');
        list.innerHTML = `
            <div>🏆 500m: Foundation Builder</div>
            <div>🏆 1000m: Consistent Athlete</div>
            <div>🏆 5000m: Elite Status</div>
        `;
    }

    function saveLog() {
        // Logic to push log to state.logs and update state.totalMin
        state.streak += 1; 
        document.getElementById('streak-count').innerText = state.streak;
        localStorage.setItem('apex_data', JSON.stringify(state));
        alert('Session Saved!');
    }

    function updateGraphView(type) {
        console.log("Switching view to: " + type);
        // Add chart.js or custom bar logic here
    }

    // Initialize
    document.getElementById('streak-count').innerText = state.streak;
</script>
</body>
</html>
