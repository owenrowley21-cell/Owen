<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #161b26;
            --bg-input: #1f2635;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --streak-orange: #f97316;
            --streak-glow: rgba(249, 115, 22, 0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 540px;
            margin: 0 auto;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .screen { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: block; }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 13px;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #ffffff;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Existing Styles */
        .home-screen { position: relative; background: linear-gradient(135deg, #111827 0%, #070a10 100%); padding: 40px 24px; border-radius: 32px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        .settings-trigger { position: absolute; top: 24px; right: 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .home-title { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; color: #fff; }
        .global-stat-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); padding: 24px 20px; border-radius: 24px; margin-bottom: 16px; }
        .streak-stat-box { background: linear-gradient(135deg, #2c1404 0%, #111827 100%); border: 1px solid rgba(249, 115, 22, 0.2); padding: 16px 20px; border-radius: 24px; margin-bottom: 40px; }
        .dashboard { background: var(--bg-card); padding: 30px 24px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.08); padding: 8px 14px; border-radius: 10px; cursor: pointer; }
        .sport-select { width: 100%; padding: 14px 16px; background: var(--accent); border: none; font-weight: 700; color: #fff; border-radius: 12px; margin-bottom: 24px; }
        .total-box { background: linear-gradient(135deg, #1e1b4b 0%, #111827 100%); padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 24px; }
        .total-number { font-size: 40px; font-weight: 800; }
        .form-group { margin-bottom: 24px; }
        input, select { width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; color: #fff; box-sizing: border-box; }
        .btn-container { display: flex; gap: 12px; }
        button.submit-btn { flex: 2; background: #fff; color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        button.clear-btn { flex: 1; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 14px; cursor: pointer; }
        .log-item { background: var(--bg-input); padding: 16px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="screen-home" class="screen active home-screen">
    <button class="settings-trigger" onclick="navigateTo('screen-settings')">⚙️</button>
    <div class="home-title">APEX TRACKER</div>
    <div class="global-stat-box">
        <div style="color: var(--text-muted); font-size: 13px;">All-Time Total Volume</div>
        <div style="font-size: 48px; font-weight: 900;" id="global-all-time-total">0</div>
    </div>
    <div class="streak-stat-box">
        <div class="streak-number">🔥 <span id="home-streak-count">0</span> Days Streak</div>
    </div>
    <button style="width: 100%; padding: 20px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer;" onclick="navigateTo('screen-tracker')">Start Tracking →</button>
</div>

<div id="screen-tracker" class="screen">
    <div class="dashboard">
        <div class="nav-header">
            <h1>Workspace</h1>
            <button class="back-btn" onclick="navigateTo('screen-home')">← Home</button>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-record')">Recording</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-goals')">Goals & Progress</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-trophies')">Trophy’s</button>
        </div>

        <div id="tab-record" class="tab-content active">
            <select id="sport-select" class="sport-select" onchange="renderSportProfile()">
                <option value="Baseball">Baseball Profile</option>
                <option value="Basketball">Basketball Profile</option>
            </select>
            <div class="total-box">
                <div id="active-sport-title" style="color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Baseball</div>
                <div class="total-number"><span id="weekly-total">0</span> <span style="font-size: 16px;">mins</span></div>
            </div>
            <div class="form-group">
                <label style="color: var(--text-muted); font-size: 14px; margin-bottom: 8px;">Duration (Minutes)</label>
                <input type="number" id="duration" placeholder="e.g. 60">
            </div>
            <div class="btn-container">
                <button class="clear-btn" onclick="confirm('Clear data?') && location.reload()">Clear</button>
                <button class="submit-btn" onclick="logSession()">Log Session</button>
            </div>
            <div id="logs-container" style="margin-top: 24px;"></div>
        </div>

        <div id="tab-goals" class="tab-content">
            <div style="text-align: center; padding: 40px 0; color: var(--text-muted);">
                <h3>Weekly Goals</h3>
                <p>Visualization and progress bars coming soon.</p>
            </div>
        </div>

        <div id="tab-trophies" class="tab-content">
            <div style="text-align: center; padding: 40px 0; color: var(--text-muted);">
                <h3>Trophy Case</h3>
                <p>Unlock achievements through consistent tracking.</p>
            </div>
        </div>
    </div>
</div>

<div id="screen-settings" class="screen">
    <div class="dashboard">
        <div class="nav-header"><h1>Settings</h1><button class="back-btn" onclick="navigateTo('screen-home')">← Home</button></div>
    </div>
</div>

<script>
    let appData = {
        Baseball: { total: 0, logs: [] },
        Basketball: { total: 0, logs: [] }
    };

    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function navigateTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function logSession() {
        const sport = document.getElementById('sport-select').value;
        const duration = parseInt(document.getElementById('duration').value);
        if (duration) {
            appData[sport].total += duration;
            appData[sport].logs.push({ duration, time: new Date().toLocaleTimeString() });
            renderSportProfile();
        }
    }

    function renderSportProfile() {
        const sport = document.getElementById('sport-select').value;
        document.getElementById('active-sport-title').innerText = sport;
        document.getElementById('weekly-total').innerText = appData[sport].total;
        document.getElementById('logs-container').innerHTML = appData[sport].logs.map(l => `
            <div class="log-item"><span>Session</span><span style="color:var(--success)">${l.duration}m</span></div>
        `).join('');
    }

    window.onload = renderSportProfile;
</script>

</body>
</html>
