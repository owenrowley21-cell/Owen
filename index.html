<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #161b26;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --streak-orange: #f97316;
            --streak-glow: rgba(249, 115, 22, 0.25);
            --music-purple: #8b5cf6;
            --success: #10b981;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-main); max-width: 540px; margin: 0 auto; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        .screen { display: none; }
        .screen.active { display: block; }

        /* Navigation */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 24px; padding: 12px; background: var(--bg-card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { cursor: pointer; color: var(--text-muted); font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); }

        .dashboard { background: var(--bg-card); padding: 24px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 24px; }
        
        /* Home Styles */
        .home-title { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; margin-top: 20px; background: linear-gradient(135deg, #ffffff 0%, #64748b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .home-subtitle { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 40px; }
        .global-stat-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); padding: 24px 20px; border-radius: 24px; margin-bottom: 16px; }
        .streak-stat-box { background: linear-gradient(135deg, #2c1404 0%, #111827 100%); border: 1px solid rgba(249, 115, 22, 0.2); padding: 16px 20px; border-radius: 24px; margin-bottom: 40px; box-shadow: 0 0 25px var(--streak-glow); }
        .global-number { font-size: 56px; font-weight: 900; }
        .streak-number { font-size: 38px; font-weight: 900; color: var(--streak-orange); }

        /* Track Screen Components */
        .workspace-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .timer-display { font-size: 48px; font-weight: 800; text-align: center; margin: 20px 0; }

        /* Music Module */
        .music-module { background: rgba(139, 92, 246, 0.1); padding: 20px; border-radius: 16px; margin-bottom: 24px; border: 1px solid rgba(139, 92, 246, 0.3); }
        .music-toggle-btn { background: var(--music-purple); color: #ffffff; border: none; padding: 12px 40px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; width: 100%; }
        .music-toggle-btn.muted { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

        /* Progress/Trophies */
        .ring-container { text-align: center; margin: 30px 0; }
        .trophy-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 20px; }
        .trophy-icon { aspect-ratio: 1; background: #1e293b; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #475569; }
        .trophy-icon.unlocked { background: var(--success); color: white; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-btn active" id="btn-home" onclick="nav('home')">Home</div>
    <div class="nav-btn" id="btn-track" onclick="nav('track')">Track</div>
    <div class="nav-btn" id="btn-progress" onclick="nav('progress')">Goals</div>
    <div class="nav-btn" id="btn-trophies" onclick="nav('trophies')">Trophies</div>
</nav>

<div id="home" class="screen active">
    <div class="home-title">APEX TRACKER</div>
    <div class="home-subtitle">Performance System</div>
    <div class="global-stat-box">
        <div>All-Time Total Volume</div>
        <div class="global-number">0</div>
    </div>
    <div class="streak-stat-box">
        <div style="color: var(--text-muted);">Current Streak</div>
        <div class="streak-number">0 Days</div>
    </div>
    <div class="music-module">
        <button class="music-toggle-btn muted" id="music-btn" onclick="toggleAudio()">Unmute</button>
    </div>
</div>

<div id="track" class="screen">
    <div class="dashboard">
        <h1>Tracking Mode</h1>
        <div class="workspace-card">
            <div class="timer-display">00:00:00</div>
            <button class="music-toggle-btn" style="background: var(--accent);">Start Session</button>
        </div>
    </div>
</div>

<div id="progress" class="screen dashboard">
    <h1>Weekly Goals</h1>
    <div class="ring-container">
        <div style="width: 150px; height: 150px; border-radius: 50%; border: 10px solid var(--accent); margin: auto; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">75%</div>
    </div>
</div>

<div id="trophies" class="screen dashboard">
    <h1>Accomplishments</h1>
    <div class="trophy-grid" id="trophy-grid"></div>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    let isPlaying = false;
    let audioContext = null;
    function toggleAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;
        document.getElementById('music-btn').innerText = isPlaying ? "Mute" : "Unmute";
        document.getElementById('music-btn').classList.toggle('muted', !isPlaying);
        if (isPlaying) playTone();
    }
    function playTone() {
        if (!isPlaying) return;
        const osc = audioContext.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(110, audioContext.currentTime);
        osc.connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + 0.5);
        setTimeout(playTone, 1000);
    }

    const grid = document.getElementById('trophy-grid');
    for(let i = 1; i <= 100; i++) {
        const div = document.createElement('div');
        div.className = 'trophy-icon ' + (i <= 20 ? 'unlocked' : '');
        div.innerText = i;
        grid.appendChild(div);
    }
</script>
</body>
</html>
