<!-- Inside the WORKSPACE SCREEN -->

<!-- TAB: GOALS & PROGRESS -->
<div id="tab-goals" class="tab-content">
    <div class="dashboard">
        <h3>Weekly Goal Progress</h3>
        <div id="goal-progress-container">
            <p style="font-size: 14px; color: var(--text-muted);">Set a target to see progress.</p>
            <div style="background:#1f2635; height:20px; border-radius:10px; overflow:hidden; margin:10px 0;">
                <div id="goal-bar" style="height:100%; width:0%; background:var(--accent); transition: width 0.5s;"></div>
            </div>
            <p id="goal-text">0 / 500 minutes</p>
        </div>
    </div>
</div>

<!-- TAB: TROPHY'S -->
<div id="tab-trophies" class="tab-content">
    <div class="dashboard">
        <h3>Achievements</h3>
        <div id="trophies-container" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <!-- Trophy Cards -->
            <div id="trophy-beginner" class="log-item" style="opacity: 0.3;">
                <span>🥉 Beginner</span>
            </div>
            <div id="trophy-pro" class="log-item" style="opacity: 0.3;">
                <span>🥈 Pro</span>
            </div>
            <div id="trophy-legend" class="log-item" style="opacity: 0.3;">
                <span>🥇 Legend</span>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ADD THIS LOGIC TO YOUR SCRIPT SECTION ---

    function updateGoalsAndTrophies() {
        const sport = document.getElementById('sport-select').value;
        const total = appData[sport].total;
        
        // Update Goal Bar (Assuming 500 min target)
        const goal = 500;
        const percentage = Math.min((total / goal) * 100, 100);
        document.getElementById('goal-bar').style.width = `${percentage}%`;
        document.getElementById('goal-text').innerText = `${total} / ${goal} minutes`;

        // Unlock Trophies
        if (total >= 100) document.getElementById('trophy-beginner').style.opacity = "1";
        if (total >= 500) document.getElementById('trophy-pro').style.opacity = "1";
        if (total >= 1000) document.getElementById('trophy-legend').style.opacity = "1";
    }

    // Modify your existing renderSportProfile to trigger the new update
    function renderSportProfile() {
        // ... (Keep your existing rendering logic)
        
        // Add this line at the end of your renderSportProfile function:
        updateGoalsAndTrophies();
    }
</script>
