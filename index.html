<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <!-- Colorful Sports App Icon Link -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/180/sports-mode.png">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #007aff;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            color: #111;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .select-row {
            display: flex;
            gap: 10px;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        select {
            background-color: #fff;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .fav-btn {
            width: auto;
            background: #f0f0f0;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 20px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .fav-btn.active {
            background: #fff3cd;
            border-color: #ffeba2;
        }

        button.primary-btn {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        button.primary-btn:active {
            background-color: #0063cc;
        }

        .log-section {
            margin-top: 25px;
        }

        .log-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent-color);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-date {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            padding: 5px 0;
            cursor: pointer;
            width: auto;
            float: right;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Apex Tracker</h1>
    
    <div class="input-group">
        <label for="sportSelect">Select Sport</label>
        <div class="select-row">
            <select id="sportSelect" onchange="checkFavStatus()">
                <!-- Populated dynamically by JavaScript -->
            </select>
            <button id="favBtn" class="fav-btn" onclick="toggleFavorite()" title="Favorite this sport">☆</button>
        </div>
    </div>

    <div class="input-group">
        <label for="statInput">Stat / Notes to Log</label>
        <input type="text" id="statInput" placeholder="e.g., played Right Back, 2 assists, 45 mins">
    </div>

    <button class="primary-btn" onclick="addLog()">Save Entry</button>

    <div class="log-section">
        <span style="font-weight:600; font-size:16px;">History</span>
        <button class="clear-btn" onclick="clearLogs()">Clear All</button>
        <div style="clear:both;"></div>
        <div id="logContainer" style="margin-top: 10px;"></div>
    </div>
</div>

<script>
    // Master list of all sports available in the app
    const ALL_SPORTS = [
        { id: "Soccer", name: "⚽ Soccer" },
        { id: "Basketball", name: "🏀 Basketball" },
        { id: "Football", name: "🏈 Football" },
        { id: "Baseball", name: "⚾ Baseball" },
        { id: "Tennis", name: "🎾 Tennis" },
        { id: "Track", name: "🏃 Track & Field" }
    ];

    window.onload = function() {
        buildSportsDropdown();
        displayLogs();
    };

    // Builds the dropdown list, placing favorites at the top
    function buildSportsDropdown(selectedId = null) {
        const select = document.getElementById('sportSelect');
        const favorites = JSON.parse(localStorage.getItem('apex_fav_sports')) || [];
        
        // Clear existing options
        select.innerHTML = '';

        // Separate sports into favorites and non-favorites
        const favSports = ALL_SPORTS.filter(sport => favorites.includes(sport.id));
        const regularSports = ALL_SPORTS.filter(sport => !favorites.includes(sport.id));

        // Add Favorites at the top of the dropdown
        if (favSports.length > 0) {
            const favGroup = document.createElement('optgroup');
            favGroup.label = "Favorites ★";
            favSports.forEach(sport => {
                const opt = document.createElement('option');
                opt.value = sport.id;
                opt.innerText = "⭐ " + sport.name;
                favGroup.appendChild(opt);
            });
            select.appendChild(favGroup);
        }

        // Add Regular sports below
        const regularGroup = document.createElement('optgroup');
        regularGroup.label = "Other Sports";
        regularSports.forEach(sport => {
            const opt = document.createElement('option');
            opt.value = sport.id;
            opt.innerText = sport.name;
            regularGroup.appendChild(opt);
        });
        select.appendChild(regularGroup);

        // Set active selection
        if (selectedId) {
            select.value = selectedId;
        } else if (favSports.length > 0) {
            // Auto-select the first favorite on launch
            select.value = favSports[0].id;
        } else {
            select.value = ALL_SPORTS[0].id;
        }

        checkFavStatus();
    }

    function toggleFavorite() {
        const currentSport = document.getElementById('sportSelect').value;
        let favorites = JSON.parse(localStorage.getItem('apex_fav_sports')) || [];

        if (favorites.includes(currentSport)) {
            // Remove from favorites
            favorites = favorites.filter(id => id !== currentSport);
        } else {
            // Add to favorites
            favorites.push(currentSport);
        }

        localStorage.setItem('apex_fav_sports', JSON.stringify(favorites));
        
        // Rebuild the dropdown so favorited sports move to the top immediately
        buildSportsDropdown(currentSport);
    }

    function checkFavStatus() {
        const currentSport = document.getElementById('sportSelect').value;
        const favorites = JSON.parse(localStorage.getItem('apex_fav_sports')) || [];
        const favBtn = document.getElementById('favBtn');

        if (favorites.includes(currentSport)) {
            favBtn.innerText = '★';
            favBtn.classList.add('active');
        } else {
            favBtn.innerText = '☆';
            favBtn.classList.remove('active');
        }
    }

    function addLog() {
        const sport = document.getElementById('sportSelect').value;
        const stat = document.getElementById('statInput').value.trim();
        
        if (!stat) {
            alert('Please enter a stat or note first!');
            return;
        }

        const timestamp = new Date().toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
        });

        const newLog = { sport, stat, timestamp };
        
        let logs = JSON.parse(localStorage.getItem('apex_tracker_logs')) || [];
        logs.unshift(newLog);
        localStorage.setItem('apex_tracker_logs', JSON.stringify(logs));

        document.getElementById('statInput').value = ''; 
        displayLogs();
    }

    function displayLogs() {
        const container = document.getElementById('logContainer');
        container.innerHTML = '';
        
        const logs = JSON.parse(localStorage.getItem('apex_tracker_logs')) || [];

        if (logs.length === 0) {
            container.innerHTML = '<p style="color:#888; font-size:14px; text-align:center;">No entries logged yet.</p>';
            return;
        }

        logs.forEach(item => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `
                <div>
                    <strong>${item.sport}</strong>: ${item.stat}
                    <div class="log-date">${item.timestamp}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function clearLogs() {
        if (confirm('Are you sure you want to clear all history?')) {
            localStorage.removeItem('apex_tracker_logs');
            displayLogs();
        }
    }
</script>

</body>
</html>
