<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <style>
        :root {
            --bg-main: #0b0f19; --bg-card: #161b26; --bg-input: #1f2635;
            --text-main: #ffffff; --text-muted: #94a3b8; --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4); --success: #10b981;
            --danger: #ef4444; --streak-orange: #f97316;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-main); max-width: 540px; margin: 0 auto; padding: 20px; }
        .screen { display: none; } .screen.active { display: block; }
        
        /* Tabs */
        .tabs-container { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-content { display: none; } .tab-content.active { display: block; }

        /* Re-inserted original UI elements */
        .dashboard { background: var(--bg-card); padding: 24px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-container { display: flex; justify-content: space-between; align-items: flex-end; height: 100px; padding: 10px 0; }
        .chart-bar { width: 24px; background: var(--accent); border-radius: 6px; height: 0%; transition: height 0.4s; }
        .sport-select { width: 100%; padding: 14px; background: var(--accent); color: white; border-radius: 12px; font-weight: 700; margin-bottom: 20px; }
        .log-item { background: var(--bg-input); padding: 16px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<!-- Tracker Screen -->
<div id="screen-tracker" class="screen active">
    <div class="dashboard">
        <div class="nav-header"><h1>Workspace</h1></div>

        <!-- Navigation Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-record')">Recording</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-goals')">Goals & Progress</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-trophies')">Trophy’s</button>
        </div>

        <!-- Recording Tab (Original Features Restored) -->
        <div id="tab-record" class="tab-content active">
            <select id="sport-select" class="sport-select" onchange="renderSportProfile()">
                <option value="Baseball">Baseball</option>
                <option value="Basketball">Basketball</option>
            </select>
            
            <div class="chart-container" id="chart-area">
                <!-- Bar Chart Elements -->
            </div>

            <input type="number" id="duration" placeholder="Duration (Minutes)" style="width:100%; padding:14px; margin-bottom:10px; background:var(--bg-input); color:white; border-radius:12px; border:none;">
            <button onclick="logSession()" style="width:100%; padding:16px; background:white; color:black; border-radius:12px; font-weight:bold;">Log Session</button>
            
            <div id="logs-container" style="margin-top:20px;"></div>
        </div>

        <div id="tab-goals" class="tab-content"><p>Goals & Progress content...</p></div>
        <div id="tab-trophies" class="tab-content"><p>Trophy case content...</p></div>
    </div>
</div>

<script>
    let appData = { Baseball: { total: 0, logs: [] }, Basketball: { total: 0, logs: [] } };

    function switchTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function logSession() {
        const sport = document.getElementById('sport-select').value;
        const duration = parseInt(document.getElementById('duration').value);
        if (duration) {
            appData[sport].total += duration;
            appData[sport].logs.push({ duration, day: 'Mon' });
            renderSportProfile();
        }
    }

    function renderSportProfile() {
        const sport = document.getElementById('sport-select').value;
        document.getElementById('logs-container').innerHTML = appData[sport].logs.map(l => `
            <div class="log-item"><span>Session</span><span style="color:var(--success)">${l.duration}m</span></div>
        `).join('');
    }
</script>
</body>
</html>
