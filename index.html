<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #161b26;
            --bg-input: #1f2635;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --streak-orange: #f97316;
            --streak-glow: rgba(249, 115, 22, 0.25);
            --music-purple: #8b5cf6;
            --music-glow: rgba(139, 92, 246, 0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 540px;
            margin: 0 auto;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .screen { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: block; }

        .home-screen {
            position: relative;
            background: linear-gradient(135deg, #111827 0%, #070a10 100%);
            padding: 40px 24px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .settings-trigger {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .settings-trigger:hover { color: #ffffff; background: rgba(255, 255, 255, 0.1); transform: rotate(45deg); }

        .home-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .global-stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px 20px;
            border-radius: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .streak-stat-box {
            background: linear-gradient(135deg, #2c1404 0%, #111827 100%);
            border: 1px solid rgba(249, 115, 22, 0.2);
            padding: 16px 20px;
            border-radius: 24px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px var(--streak-glow);
        }

        .global-number {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -2px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .streak-number {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--streak-orange);
            text-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.launch-btn {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-main);
            border: none;
            padding: 20px;
            font-weight: 800;
            border-radius: 18px;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: -0.2px;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }
        button.launch-btn:hover { transform: scale(1.02); box-shadow: 0 12px 30px rgba(255, 255, 255, 0.2); }

        .dashboard {
            background: var(--bg-card);
            padding: 30px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

        h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .music-module {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.1);
        }

        .music-toggle-btn {
            background: var(--music-purple);
            color: #ffffff;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            width: 100%;
        }
        .music-toggle-btn.muted {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="screen-home" class="screen active home-screen">
    <button class="settings-trigger" onclick="navigateTo('screen-tracker')">⚙️</button>
    <div class="home-title">APEX TRACKER</div>
    <div class="home-subtitle">Performance System</div>
    
    <div class="global-stat-box">
        <div class="total-label" style="margin-bottom: 12px;">All-Time Total Volume</div>
        <div class="global-number"><span id="global-all-time-total">0</span></div>
    </div>

    <div class="music-module">
        <button class="music-toggle-btn muted" id="music-action-btn" onclick="toggleRadioPlayback()">Unmute</button>
    </div>

    <button class="launch-btn" onclick="navigateTo('screen-tracker')">Enter Workspace →</button>
</div>

<div id="screen-tracker" class="screen">
    <div class="dashboard">
        <div class="nav-header">
            <h1>Workspace</h1>
            <button class="back-btn" onclick="navigateTo('screen-home')">← Home</button>
        </div>
    </div>
</div>

<script>
    let audioContext = null;
    let audioNode = null;
    let isMusicPlaying = false;

    function navigateTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function toggleRadioPlayback() {
        const btn = document.getElementById('music-action-btn');
        
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (isMusicPlaying) {
            if (audioNode) {
                audioNode.stop();
                audioNode = null;
            }
            isMusicPlaying = false;
            btn.innerText = "Unmute";
            btn.classList.add('muted');
        } else {
            isMusicPlaying = true;
            btn.innerText = "Mute";
            btn.classList.remove('muted');
            playContinuousHypeLoop();
        }
    }

    function playContinuousHypeLoop() {
        if (!isMusicPlaying) return;

        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        // Changed to triangle for a smoother organ/tone sound
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(110, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(165, audioContext.currentTime + 3);
        osc.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 6);

        gain.gain.setValueAtTime(0.04, audioContext.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioContext.currentTime + 5.8);

        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        audioNode = osc;
        osc.start();

        osc.onended = () => {
            if (isMusicPlaying) playContinuousHypeLoop();
        };
    }
</script>
</body>
</html>
