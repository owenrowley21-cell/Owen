<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker</title>
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --card-bg: #13131a;
            --border-color: #22222e;
            --text-main: #f0f0f5;
            --text-muted: #79798c;
            --accent-green: #00ff88;
            --accent-red: #ff4b4b;
            --accent-gold: #ffd700;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: #0d0d11;
            min-height: 100vh;
            padding-bottom: 90px;
            box-sizing: border-box;
            position: relative;
        }

        .header-padding {
            padding: 20px 20px 10px 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Settings Gear Icon */
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-btn:hover {
            color: var(--text-main);
        }
        .settings-btn:active {
            transform: rotate(45deg);
        }

        /* Streak Display */
        .streak-widget {
            background: rgba(255, 75, 75, 0.08);
            border: 1px solid rgba(255, 75, 75, 0.25);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .streak-number {
            font-size: 15px;
            font-weight: 800;
            color: var(--accent-red);
        }

        /* Settings Drawer */
        .settings-drawer {
            display: none;
            background: #161622;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin: 0 20px 15px 20px;
        }
        .settings-drawer.open {
            display: block;
        }

        /* Dashboard Elements */
        .dashboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin: 0 20px 20px 20px;
        }

        .card-title {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 700;
        }

        /* Views */
        .tab-view {
            display: none;
        }
        .tab-view.active-view {
            display: block;
        }

        /* Inputs & Controls */
        select, input {
            width: 100%;
            background: #181822;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .option-chip {
            background: #181822;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-chip.selected {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* Charts */
        .chart-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 120px;
            padding-top: 15px;
            margin-top: 10px;
        }

        .chart-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 11%;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar {
            width: 100%;
            background: linear-gradient(180deg, var(--accent-green) 0%, rgba(0,255,136,0.2) 100%);
            border-radius: 4px 4px 0 0;
            height: 0%;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .chart-tip {
            font-size: 9px;
            color: var(--text-main);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .chart-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Feeds */
        .log-item {
            background: #181822;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-day { font-size: 13px; font-weight: 700; }
        .log-activity { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .log-time-stamp { font-size: 10px; color: #4e4e61; margin-top: 4px; }
        .log-time { font-size: 14px; font-weight: 700; color: var(--accent-green); }

        /* Trophies */
        .trophy-shelf {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .trophy-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .trophy-card.unlocked {
            border-color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.02);
        }
        .trophy-card.locked {
            opacity: 0.3;
            filter: grayscale(1);
        }
        .trophy-icon { font-size: 36px; margin-bottom: 8px; display: block; }
        .trophy-name { font-size: 14px; font-weight: 700; display: block; margin-bottom: 4px; }
        .trophy-desc { font-size: 11px; color: var(--text-muted); line-height: 1.3; }

        /* Audio Module */
        .audio-dock {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 20px 20px 20px;
        }
        .audio-info { display: flex; align-items: center; gap: 12px; }
        .track-title { font-size: 13px; font-weight: 600; }
        .track-artist { font-size: 11px; color: var(--text-muted); }
        .audio-controls { display: flex; align-items: center; gap: 14px; }
        .audio-btn { background: transparent; border: none; color: white; font-size: 15px; cursor: pointer; }
        .audio-btn.mute-toggle { font-size: 16px; color: var(--text-muted); }
        .audio-btn.mute-toggle.active-mute { color: var(--accent-red); }

        /* Bottom Nav */
        .nav-dock {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #111116;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item.active-nav {
            color: var(--accent-green);
        }
        .nav-item span { font-size: 18px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- HEADER -->
    <div class="header-padding">
        <div class="dashboard-header">
            <div>
                <h1>Apex Tracker</h1>
                <p style="color: var(--text-muted); margin: 4px 0 0 0;" id="app-subtitle">Dashboard View</p>
            </div>
            
            <div class="header-right">
                <!-- Home-Only Streak Element -->
                <div class="streak-widget" id="home-streak-badge">
                    <span style="font-size:14px">🔥</span>
                    <span id="streak-count" class="streak-number">5</span>
                </div>

                <!-- Settings Gear Icon -->
                <button class="settings-btn" id="gear-button" onclick="toggleSettingsDrawer()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- Collapsible Settings Panel (For Switching Sports) -->
    <div id="settings-drawer" class="settings-drawer">
        <label style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; display: block;">SWITCH SPORT PROFILE</label>
        <select id="sport-select" onchange="renderSportProfile()" style="margin-bottom: 0;">
            <option value="Soccer">Soccer Profile</option>
            <option value="Cardio">Cardio & Run</option>
            <option value="Strength">Strength Engine</option>
        </select>
    </div>

    <!-- TAB 1: HOME PAGE -->
    <div id="view-home" class="tab-view active-view">
        <!-- Input Form Component -->
        <div class="dashboard-card">
            <h3 class="card-title">Log Training Session</h3>
            
            <div class="chips-grid" id="chips-container"></div>

            <div id="custom-activity-wrapper" style="display: none;">
                <input type="text" id="custom-activity" placeholder="Name your custom activity...">
            </div>

            <input type="number" id="session-duration" placeholder="Duration (minutes)" min="1">
            <button class="submit-btn" onclick="submitLog()">Save Activity Log</button>
        </div>

        <!-- Metric Engine Visual Chart -->
        <div class="dashboard-card">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h3 class="card-title" id="active-sport-title">Soccer</h3>
                <span style="font-size: 13px; font-weight: 700; color: var(--accent-green);"><span id="weekly-total">0</span> mins this week</span>
            </div>
            <div class="chart-container">
                <div class="chart-column"><div class="chart-tip" id="tip-Mon">0m</div><div class="chart-bar" id="bar-Mon"></div><div class="chart-label">M</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Tue">0m</div><div class="chart-bar" id="bar-Tue"></div><div class="chart-label">T</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Wed">0m</div><div class="chart-bar" id="bar-Wed"></div><div class="chart-label">W</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Thu">0m</div><div class="chart-bar" id="bar-Thu"></div><div class="chart-label">T</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Fri">0m</div><div class="chart-bar" id="bar-Fri"></div><div class="chart-label">F</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Sat">0m</div><div class="chart-bar" id="bar-Sat"></div><div class="chart-label">S</div></div>
                <div class="chart-column"><div class="chart-tip" id="tip-Sun">0m</div><div class="chart-bar" id="bar-Sun"></div><div class="chart-label">S</div></div>
            </div>
        </div>

        <!-- Audio Module Layout -->
        <div class="audio-dock">
            <div class="audio-info">
                <span style="font-size: 18px;">🎵</span>
                <div>
                    <div id="track-title" class="track-title">Ransom</div>
                    <div id="track-artist" class="track-artist">Apex Playlist</div>
                </div>
            </div>
            <div class="audio-controls">
                <button onclick="toggleMute()" id="mute-btn" class="audio-btn mute-toggle">🔊</button>
                <button onclick="togglePlay()" id="play-btn" class="audio-btn" style="color: var(--accent-green);">▶</button>
                <button onclick="nextTrack()" class="audio-btn">⏭</button>
            </div>
            <audio id="bg-audio" loop></audio> 
        </div>

        <!-- Activity History Log -->
        <div class="dashboard-card">
            <h3 class="card-title">Active Week Feed</h3>
            <div id="logs-container"></div>
        </div>
    </div>

    <!-- TAB 2: TROPHY ROOM & MILESTONES -->
    <div id="view-trophies" class="tab-view">
        <div class="trophy-shelf" id="trophy-shelf">
            <!-- Rendered dynamically -->
        </div>
    </div>

    <!-- GLOBAL DOCK NAVIGATION BAR -->
    <div class="nav-dock">
        <button class="nav-item active-nav" id="nav-btn-home" onclick="switchTab('home')">
            <span>🏠</span>Home
        </button>
        <button class="nav-item" id="nav-btn-trophies" onclick="switchTab('trophies')">
            <span>🏆</span>Trophies
        </button>
    </div>

</div>

<script>
    // App State Configuration
    let appData = {
        Soccer: { total: 90, logs: [{ day: "Monday", activities: ["Agility Drills"], duration: 45, timestamp: "7/13/2026, 4:15 PM" }, { day: "Tuesday", activities: ["Tactical Film"], duration: 45, timestamp: "7/14/2026, 9:30 AM" }] },
        Cardio: { total: 30, logs: [{ day: "Monday", activities: ["Sprints"], duration: 30, timestamp: "7/13/2026, 6:00 AM" }] },
        Strength: { total: 0, logs: [] }
    };

    const sportOptions = {
        Soccer: ["Agility Drills", "Tactical Film", "Ball Work", "Other"],
        Cardio: ["Sprints", "Distance Run", "Intervals", "Other"],
        Strength: ["Core Engine", "Lower Body", "Upper Explosive", "Other"]
    };

    let selectedActivities = [];
    let userStreak = 5; 
    let isMuted = false;
    let isPlaying = false;
    let currentTrackIndex = 0;

    const playlist = [
        { title: "Ransom", artist: "Apex Playlist", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" }, 
        { title: "The Show Goes On", artist: "Apex Playlist", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "Remember the Name", artist: "Apex Playlist", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];

    let milestones = [
        { id: 'first_log', title: 'First Blood', desc: 'Log your first tracking session', icon: '🎯', check: () => true }, 
        { id: 'streak_3', title: 'Consistent', desc: 'Maintain a 3+ day tracking streak', icon: '⚡', check: () => userStreak >= 3 },
        { id: 'streak_5', title: 'Unstoppable', desc: 'Hit a 5-day active target streak', icon: '🔥', check: () => userStreak >= 5 },
        { id: 'elite_vol', title: 'Elite Volume', desc: 'Complete a single log over 60 mins', icon: '👑', check: () => Object.values(appData).some(s => s.logs.some(l => l.duration >= 60)) }
    ];

    // Core Init Launcher
    document.addEventListener("DOMContentLoaded", () => {
        renderSportProfile();
        renderTrophies();
        loadTrack(currentTrackIndex);
    });

    /* --- SETTINGS DRAWER MANAGEMENT --- */
    function toggleSettingsDrawer() {
        const drawer = document.getElementById('settings-drawer');
        drawer.classList.toggle('open');
    }

    /* --- TAB ROUTER --- */
    function switchTab(targetTab) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active-nav'));
        
        const streakBadge = document.getElementById('home-streak-badge');
        const gearButton = document.getElementById('gear-button');
        const drawer = document.getElementById('settings-drawer');
        const subtitle = document.getElementById('app-subtitle');

        if (targetTab === 'home') {
            document.getElementById('view-home').classList.add('active-view');
            document.getElementById('nav-btn-home').classList.add('active-nav');
            streakBadge.style.display = 'flex'; 
            gearButton.style.display = 'block';
            subtitle.innerText = "Dashboard View";
            renderSportProfile(); 
        } else if (targetTab === 'trophies') {
            document.getElementById('view-trophies').classList.add('active-view');
            document.getElementById('nav-btn-trophies').classList.add('active-nav');
            streakBadge.style.display = 'none'; 
            gearButton.style.display = 'none';
            drawer.classList.remove('open'); 
            subtitle.innerText = "Milestone Achievements";
            renderTrophies();
        }
    }

    /* --- PROFILE & RENDER LOGIC --- */
    function renderSportProfile() {
        const currentSport = document.getElementById('sport-select').value;
        document.getElementById('active-sport-title').innerText = currentSport;
        document.getElementById('weekly-total').innerText = appData[currentSport].total;
        
        selectedActivities = [];
        document.getElementById('custom-activity-wrapper').style.display = 'none';
        document.getElementById('custom-activity').value = '';

        const chipsContainer = document.getElementById('chips-container');
        chipsContainer.innerHTML = '';

        if (sportOptions[currentSport]) {
            sportOptions[currentSport].forEach(activity => {
                const chip = document.createElement('div');
                chip.className = 'option-chip';
                chip.innerText = activity;
                chip.onclick = function() {
                    if (chip.classList.contains('selected')) {
                        chip.classList.remove('selected');
                        selectedActivities = selectedActivities.filter(a => a !== activity);
                        if (activity === 'Other') document.getElementById('custom-activity-wrapper').style.display = 'none';
                    } else {
                        chip.classList.add('selected');
                        selectedActivities.push(activity);
                        if (activity === 'Other') document.getElementById('custom-activity-wrapper').style.display = 'block';
                    }
                };
                chipsContainer.appendChild(chip);
            });
        }
        updateChartData(currentSport);
        renderActiveFeed(currentSport);
    }

    function submitLog() {
        const currentSport = document.getElementById('sport-select').value;
        const durationInput = document.getElementById('session-duration');
        const duration = parseInt(durationInput.value);

        if (!duration || duration <= 0) {
            alert("Please input a valid training duration.");
            return;
        }

        let finalActivities = [...selectedActivities].filter(a => a !== 'Other');
        if (selectedActivities.includes('Other')) {
            const customVal = document.getElementById('custom-activity').value.trim();
            if (customVal) finalActivities.push(customVal);
        }

        if (finalActivities.length === 0) finalActivities.push("General Training");

        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const currentDay = days[new Date().getDay()];

        appData[currentSport].logs.push({
            day: currentDay,
            activities: finalActivities,
            duration: duration,
            timestamp: new Date().toLocaleString()
        });

        appData[currentSport].total += duration;
        durationInput.value = '';
        
        document.getElementById('settings-drawer').classList.remove('open');
        renderSportProfile();
    }

    /* --- CHARTS AND FEED GRAPHICS --- */
    function updateChartData(sport) {
        const dailyTotals = { Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0, Saturday: 0, Sunday: 0 };
        if (appData[sport] && appData[sport].logs) {
            appData[sport].logs.forEach(log => {
                if (dailyTotals[log.day] !== undefined) dailyTotals[log.day] += log.duration;
            });
        }

        const maxVal = Math.max(...Object.values(dailyTotals), 1);
        const dayAbbrev = { Monday: 'Mon', Tuesday: 'Tue', Wednesday: 'Wed', Thursday: 'Thu', Friday: 'Fri', Saturday: 'Sat', Sunday: 'Sun' };

        Object.keys(dailyTotals).forEach(day => {
            const abbrev = dayAbbrev[day];
            const bar = document.getElementById(`bar-${abbrev}`);
            const tooltip = document.getElementById(`tip-${abbrev}`);
            const value = dailyTotals[day];
            
            if (bar && tooltip) {
                bar.style.height = value > 0 ? `${Math.max((value / maxVal) * 100, 15)}%` : '0%'; 
                tooltip.innerText = `${value}m`;
            }
        });
    }

    function renderActiveFeed(sport) {
        const container = document.getElementById('logs-container');
        container.innerHTML = '';

        if (!appData[sport] || !appData[sport].logs || appData[sport].logs.length === 0) {
            container.innerHTML = '<p style="color: var(--text-muted); font-size: 13px; text-align: center; margin: 15px 0;">No logs found for active profile.</p>';
            return;
        }

        appData[sport].logs.slice().reverse().forEach(log => {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <div>
                    <div class="log-day">${log.day}</div>
                    <div class="log-activity">${log.activities.join(', ')}</div>
                    <div class="log-time-stamp">${log.timestamp}</div>
                </div>
                <div class="log-time">${log.duration}m</div>
            `;
            container.appendChild(item);
        });
    }

    /* --- TROPHY SYSTEM --- */
    function renderTrophies() {
        const shelf = document.getElementById('trophy-shelf');
        shelf.innerHTML = '';

        milestones.forEach(trophy => {
            const isUnlocked = trophy.check();
            const card = document.createElement('div');
            card.className = `trophy-card ${isUnlocked ? 'unlocked' : 'locked'}`;
            card.innerHTML = `
                <span class="trophy-icon">${trophy.icon}</span>
                <span class="trophy-name">${trophy.title}</span>
                <span class="trophy-desc">${trophy.desc}</span>
            `;
            shelf.appendChild(card);
        });
    }

    /* --- AUDIO CONTROLS --- */
    const audioEl = document.getElementById('bg-audio');

    function loadTrack(index) {
        const track = playlist[index];
        document.getElementById('track-title').innerText = track.title;
        document.getElementById('track-artist').innerText = track.artist;
        audioEl.src = track.src;
    }

    function togglePlay() {
        const playBtn = document.getElementById('play-btn');
        if (isPlaying) {
            audioEl.pause();
            playBtn.innerText = "▶";
            isPlaying = false;
        } else {
            audioEl.play().catch(e => console.log("Audio link connecting..."));
            playBtn.innerText = "⏸";
            isPlaying = true;
        }
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audioEl.play().catch(() => {});
    }

    function toggleMute() {
        const muteBtn = document.getElementById('mute-btn');
        if (isMuted) {
            audioEl.muted = false;
            muteBtn.innerText = "🔊";
            muteBtn.classList.remove('active-mute');
            isMuted = false;
        } else {
            audioEl.muted = true;
            muteBtn.innerText = "🔇";
            muteBtn.classList.add('active-mute');
            isMuted = true;
        }
    }
</script>

</body>
</html>
