<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tracker OS</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #161b26;
            --bg-input: #1f2635;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --danger: #ef4444;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-main); color: var(--text-main); max-width: 540px; margin: 0 auto; padding: 20px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* Structural Screens */
        .screen { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: block; }

        /* Navigation */
        .nav-bar { display: flex; justify-content: space-between; padding: 10px 0 20px 0; }
        .nav-link { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); padding: 8px 12px; font-size: 11px; font-weight: 700; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .nav-link.active { color: var(--text-main); border-color: var(--accent); background: rgba(79, 70, 229, 0.1); }

        /* Home Screen */
        .home-screen { background: linear-gradient(135deg, #111827 0%, #070a10 100%); padding: 40px 24px; border-radius: 32px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.03); }
        .home-title { font-size: 36px; font-weight: 900; margin-top: 20px; background: linear-gradient(135deg, #ffffff 0%, #64748b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .home-subtitle { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 60px; }
        .global-stat-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 20px; border-radius: 24px; margin-bottom: 40px; }
        .global-number { font-size: 56px; font-weight: 900; color: #ffffff; }
        button.launch-btn { width: 100%; background: var(--text-main); color: var(--bg-main); border: none; padding: 20px; font-weight: 800; border-radius: 18px; cursor: pointer; font-size: 18px; transition: all 0.25s ease; }

        /* Dashboard Components */
        .dashboard { background: var(--bg-card); padding: 30px 24px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .total-box { background: linear-gradient(135deg, #1e1b4b 0%, #111827 100%); border: 1px solid rgba(79, 70, 229, 0.3); padding: 20px; border-radius: 16px; margin-bottom: 24px; text-align: center; }
        .total-number { font-size: 40px; font-weight: 800; color: var(--text-main); }
        
        /* Progress & Trophies Styles */
        .progress-bar-container { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; margin-top: 15px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--success); transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .trophy-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .trophy-cell { aspect-ratio: 1; background: #1e293b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0.3; transition: all 0.3s; }
        .trophy-cell.unlocked { background: var(--success); opacity: 1; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        /* Chart & List Styles */
        .chart-bar { width: 24px; background: linear-gradient(0deg, var(--accent) 0%, #818cf8 100%); border-radius: 6px 6px 2px 2px; transition: height 0.4s; }
        .log-item { background: var(--bg-input); padding: 16px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Form & Utilities */
        select, input { width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; color: var(--text-main); font-size: 16px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .option-chip { background: var(--bg-input); padding: 14px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 14px; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); }
        .option-chip.selected { background: rgba(79, 70, 229, 0.2); border-color: var(--accent); color: #a5b4fc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<div class="nav-bar">
    <div class="nav-link" id="nav-home" onclick="navigateTo('screen-home')">Home</div>
    <div class="nav-link" id="nav-tracker" onclick="navigateTo('screen-tracker')">Track</div>
    <div class="nav-link" id="nav-progress" onclick="navigateTo('screen-progress')">Goals</div>
    <div class="nav-link" id="nav-trophies" onclick="navigateTo('screen-trophies')">Awards</div>
</div>

<!-- SCREENS -->
<div id="screen-home" class="screen active home-screen">
    <div class="home-title">APEX TRACKER</div>
    <div class="home-subtitle">Performance Operating System</div>
    <div class="global-stat-box">
        <div style="color:var(--text-muted); text-transform:uppercase; font-size:12px; margin-bottom:10px;">Lifetime Volume</div>
        <div class="global-number"><span id="global-total">0</span></div>
    </div>
    <button class="launch-btn" onclick="navigateTo('screen-tracker')">Enter Workspace</button>
</div>

<div id="screen-tracker" class="screen">
    <div class="dashboard">
        <h1>Workspace</h1>
        <select id="sport-select" class="sport-select" onchange="renderApp()">
            <option>Baseball</option><option>Basketball</option><option>Football</option><option>Golf</option>
            <option>Soccer</option><option>Swimming</option><option>Tennis</option><option>Track & Field</option>
        </select>
        <div class="total-box">
            <div class="total-label">Current Weekly Volume</div>
            <div class="total-number"><span id="weekly-total">0</span> <span style="font-size: 16px;">min</span></div>
        </div>
        <div class="form-group">
            <div class="options-grid" id="chips-container"></div>
            <input type="number" id="duration" placeholder="Duration (mins)" style="margin-top:10px;">
            <button class="launch-btn" style="padding:15px; margin-top:10px;" onclick="logSession()">Log Session</button>
        </div>
        <div class="log-list" id="logs-container"></div>
    </div>
</div>

<div id="screen-progress" class="screen">
    <div class="dashboard">
        <h1>Weekly Goals</h1>
        <div class="total-box">
            <div class="total-label">Target: 300 Minutes</div>
            <div class="total-number" id="progress-text">0%</div>
            <div class="progress-bar-container"><div id="progress-bar"></div></div>
        </div>
    </div>
</div>

<div id="screen-trophies" class="screen">
    <div class="dashboard">
        <h1>Accomplishments</h1>
        <div class="trophy-grid" id="trophy-grid"></div>
    </div>
</div>

<script>
    const sportOptions = {
        Baseball: ['Hitting', 'Fielding', 'Pitching', 'Other'],
        Basketball: ['Shooting', 'Handling', 'Scrimmage', 'Other'],
        Football: ['Running', 'Drills', 'Strategy', 'Other'],
        Golf: ['Range', 'Putting', 'Full Round', 'Other'],
        Soccer: ['Fitness', 'Ball Work', 'Tactics', 'Other'],
        Swimming: ['Laps', 'Drills', 'Endurance', 'Other'],
        Tennis: ['Serves', 'Rallies', 'Footwork', 'Other'],
        'Track & Field': ['Sprints', 'Distance', 'Form', 'Other']
    };

    let appData = JSON.parse(localStorage.getItem('apex_data')) || {
        total: 0,
        Baseball: { total: 0, logs: [] }, Basketball: { total: 0, logs: [] },
        Football: { total: 0, logs: [] }, Golf: { total: 0, logs: [] },
        Soccer: { total: 0, logs: [] }, Swimming: { total: 0, logs: [] },
        Tennis: { total: 0, logs: [] }, 'Track & Field': { total: 0, logs: [] }
    };

    function navigateTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id.replace('screen-', '')).classList.add('active');
        renderApp();
    }

    function renderApp() {
        const sport = document.getElementById('sport-select').value;
        document.getElementById('weekly-total').innerText = appData[sport].total;
        document.getElementById('global-total').innerText = appData.total;
        
        // Update Progress
        const weeklySum = Object.values(appData).reduce((sum, s) => sum + (s.total || 0), 0);
        const progress = Math.min((weeklySum / 300) * 100, 100);
        document.getElementById('progress-bar').style.width = progress + '%';
        document.getElementById('progress-text').innerText = Math.round(progress) + '%';

        // Update Trophies
        const grid = document.getElementById('trophy-grid');
        grid.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const div = document.createElement('div');
            div.className = 'trophy-cell ' + (appData.total >= i * 500 ? 'unlocked' : '');
            div.innerHTML = '🏆';
            grid.appendChild(div);
        }
    }

    function logSession() {
        const sport = document.getElementById('sport-select').value;
        const dur = parseInt(document.getElementById('duration').value);
        if(!dur) return;
        appData[sport].total += dur;
        appData.total += dur;
        localStorage.setItem('apex_data', JSON.stringify(appData));
        renderApp();
    }

    // Init
    navigateTo('screen-home');
</script>
</body>
</html>
